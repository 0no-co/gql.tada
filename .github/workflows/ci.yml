name: CI

on:
  pull_request:
  pull_request_review:
    types: [submitted, edited]
    branches: changeset-release/main

jobs:
  check:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: TypeScript
        run: pnpm run check

      - name: Linting
        run: pnpm run lint

      - name: Unit Tests
        run: pnpm run test

      - name: benchmarks
        run: pnpm run bench --run

      - name: Build
        run: pnpm multi --include-workspace-root run build
